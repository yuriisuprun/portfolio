spring.application.name=portfolio

server.port=${PORT:8080}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:10000}

app.email.enabled=${MAIL_ENABLED:true}
app.email.provider=${MAIL_PROVIDER:auto}
app.email.to=${MAIL_TO:${MAIL_USER:${MAIL_FROM:}}}
app.email.from=${MAIL_FROM:${MAIL_USER:}}
app.email.fail-fast=${MAIL_FAIL_FAST:false}
app.email.cooldown-seconds=${MAIL_COOLDOWN_SECONDS:900}
app.email.smtp.assume-blocked=${MAIL_SMTP_ASSUME_BLOCKED:false}
app.email.resend.api-key=${RESEND_API_KEY:}
app.email.resend.base-url=${RESEND_BASE_URL:https://api.resend.com}

logging.level.org.springframework.mail=INFO
logging.level.com.suprun=INFO

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://yuriisuprun.vercel.app,https://*.vercel.app}

app.rate-limit.contact.enabled=${CONTACT_RATE_LIMIT_ENABLED:true}
app.rate-limit.contact.limit=${CONTACT_RATE_LIMIT:5}
app.rate-limit.contact.window-seconds=${CONTACT_RATE_LIMIT_WINDOW_SECONDS:60}
app.rate-limit.contact.max-keys=${CONTACT_RATE_LIMIT_MAX_KEYS:10000}

spring.application.name=portfolio

server.port=${PORT:8080}

# SMTP Mail configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:10000}

# App-level email settings
# Set MAIL_TO in Render to actually receive contact messages.
app.email.enabled=${MAIL_ENABLED:true}
# Default recipient to the SMTP username (common case: same inbox), but allow overriding via MAIL_TO.
app.email.to=${MAIL_TO:${MAIL_USER:}}
# If not set, many SMTP providers will still accept the username as "from"; set explicitly if required.
app.email.from=${MAIL_FROM:${MAIL_USER:}}
# If true, failures throw (not recommended in production since @Async will log uncaught exceptions).
app.email.fail-fast=${MAIL_FAIL_FAST:false}
# After an SMTP connect timeout, disable sending for a while so contact submissions don't keep triggering 10s timeouts.
app.email.cooldown-seconds=${MAIL_COOLDOWN_SECONDS:900}

# logging levels
logging.level.org.springframework.mail=INFO
logging.level.com.suprun=INFO

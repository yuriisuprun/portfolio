name: Keep Render server alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Render API
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Send keep-alive request
        run: |
          curl --retry 3 --retry-delay 5 --fail --silent --show-error \
          https://yuriisuprun.onrender.com/internal/ping
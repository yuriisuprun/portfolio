name: Keeps server alive because the Render free tier stops the instance after 15 minutes of inactivity

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/keep-alive.yml"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Timestamp (UTC)
        run: date -u
      - name: Ping API
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            -w "\nHTTP %{http_code}\n" \
            https://yuriisuprun.onrender.com/internal/ping

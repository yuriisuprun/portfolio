version: 2
updates:
  # Backend (Java/Maven)
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "org.springframework.boot:*"
        versions: ["2.7.x"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "backend"

  # Frontend (Node/npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "react*"
        versions: ["17.x"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "frontend"